spring.application.name=movierecommendation

# PostgreSQL - dùng Railway's built-in vars
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.open-in-view=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.physical_naming_strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.properties.hibernate.implicit_naming_strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl

# Server
server.port=${PORT:8080}

# Thymeleaf
spring.thymeleaf.cache=true
spring.thymeleaf.encoding=UTF-8

# HikariCP
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=60000
# Retry connecting until DB is ready (Railway race condition fix)
spring.datasource.hikari.initialization-fail-timeout=-1
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# API Keys
openai.api.key=${openai.api.key:}
tmdb.api.key=${tmdb.api.key:}
app.remember-me-key=${app.remember-me-key:movieRecProdKey2024}

# Logging
logging.level.com.example.movierecommendation=INFO

# Mail Configuration (Railway Env Vars)
# QUAY LẠI CỔNG 587 với IPv4 Fix
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
# Cổng 587 dùng STARTTLS thay vì SSL trực tiếp
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.enable=false

# Bảo mật và Giao thức
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2 TLSv1.3

# Cấu hình Timeout (ms)
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# Bật Debug để xem log chi tiết kết nối trên Railway
spring.mail.properties.mail.debug=true

app.mail.from=${APP_MAIL_FROM:noreply@movierec.local}
app.verification.code-expiration-minutes=10
app.verification.code-length=6