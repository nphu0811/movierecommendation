<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Manage Movies – Admin</title>
  <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}"/>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="admin-layout">
  <div th:replace="~{fragments :: adminSidebar('movies')}"></div>

  <main class="admin-main">
    <div class="admin-header" style="display:flex;justify-content:space-between;align-items:flex-start">
      <div>
        <h1>Movies</h1>
        <p style="color:#6c757d;font-size:.875rem"
           th:text="|${moviePage.totalElements} total movies|">0 movies</p>
      </div>
      <a href="/admin/movies/new" class="btn btn-primary">+ Add Movie</a>
    </div>

    <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
    <div class="alert alert-danger"  th:if="${error}"   th:text="${error}"></div>

    <div style="background:var(--bg-elevated);border-radius:12px;overflow:hidden">
      <table class="data-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Poster</th>
            <th>Title</th>
            <th>Year</th>
            <th>Genres</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="movie : ${moviePage.content}">
            <td style="color:#6c757d" th:text="${movie.movieId}">1</td>
            <td>
              <img th:if="${movie.posterUrl != null and !#strings.isEmpty(movie.posterUrl)}"
                   th:src="${movie.posterUrl}" th:alt="${movie.title}"
                   style="width:36px;height:54px;border-radius:4px;object-fit:cover"
                   onerror="this.style.display='none'"/>
              <span th:unless="${movie.posterUrl != null and !#strings.isEmpty(movie.posterUrl)}">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="var(--text-muted)" viewBox="0 0 256 256"><path d="M224,48H32A16,16,0,0,0,16,64V192a16,16,0,0,0,16,16H224a16,16,0,0,0,16-16V64A16,16,0,0,0,224,48ZM64,192H32V160H64Zm0-64H32V96H64ZM192,192H80V64H192ZM224,192H208V160h16Zm0-64H208V96h16Z"></path></svg>
              </span>
            </td>
            <td style="font-weight:500" th:text="${movie.title}">Title</td>
            <td th:text="${movie.releaseYear}">2024</td>
            <td>
              <div class="genre-tags">
                <span class="genre-tag" th:each="g : ${movie.genres}" th:text="${g.genreName}">G</span>
              </div>
            </td>
            <td>
              <div style="display:flex;gap:.5rem">
                <a th:href="@{/admin/movies/{id}/edit(id=${movie.movieId})}"
                   class="btn btn-outline btn-sm">
                   <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 256 256" style="margin-right:4px;vertical-align:-3px"><path d="M227.31,73.37,182.63,28.68a16,16,0,0,0-22.63,0L36.69,152A15.86,15.86,0,0,0,32,163.31V208a16,16,0,0,0,16,16H92.69A15.86,15.86,0,0,0,104,219.31L227.31,96a16,16,0,0,0,0-22.63ZM92.69,208H48V163.31l88-88L180.69,120ZM192,108.68,147.31,64l24-24L216,84.68Z"></path></svg> Edit
                </a>
                <form th:action="@{/admin/movies/{id}/delete(id=${movie.movieId})}"
                      method="post" style="margin:0"
                      onsubmit="return confirm('Delete this movie?')">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                  <button type="submit" class="btn btn-danger btn-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 256 256" style="margin-right:4px;vertical-align:-3px"><path d="M216,48H176V40a24,24,0,0,0-24-24H104A24,24,0,0,0,80,40v8H40a8,8,0,0,0,0,16h8V208a16,16,0,0,0,16,16H192a16,16,0,0,0,16-16V64h8a8,8,0,0,0,0-16ZM96,40a8,8,0,0,1,8-8h48a8,8,0,0,1,8,8v8H96Zm96,168H64V64H192ZM112,104v64a8,8,0,0,1-16,0V104a8,8,0,0,1,16,0Zm48,0v64a8,8,0,0,1-16,0V104a8,8,0,0,1,16,0Z"></path></svg> Delete
                  </button>
                </form>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Pagination -->
    <div th:if="${moviePage.totalPages > 1}" id="pagination-container"
     th:attr="data-current=${moviePage.number}, data-total=${moviePage.totalPages}">
	</div>
  </main>
</div>
<script th:src="@{/js/app.js}"></script>
<script th:src="@{/js/pagination.js}"></script>
<script>
initPagination('pagination-container', '/admin/movies');
</script>
</body>
</html>
