<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Manage Users – Admin</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="sidebar-logo">⚙ Admin</div>
    <nav class="sidebar-nav">
      <a href="/admin">📊 Dashboard</a>
      <a href="/admin/movies">🎬 Movies</a>
      <a href="/admin/genres">🎭 Genres</a>
      <a href="/admin/users" class="active">👥 Users</a>
      <a href="/">← Back to Site</a>
    </nav>
  </aside>

  <main class="admin-main">
    <div class="admin-header">
      <h1>Users</h1>
      <p style="color:#6c757d;font-size:.875rem" th:text="|${userPage.totalElements} registered users|">0 users</p>
    </div>

    <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>

    <div style="background:#1f1f1f;border-radius:12px;overflow:hidden">
      <table class="data-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Username</th>
            <th>Email</th>
            <th>Role</th>
            <th>Status</th>
            <th>Joined</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="user : ${userPage.content}">
            <td style="color:#6c757d" th:text="${user.userId}">1</td>
            <td>
              <div style="display:flex;align-items:center;gap:.5rem">
                <div style="width:32px;height:32px;border-radius:50%;background:#e50914;
                            display:flex;align-items:center;justify-content:center;
                            font-size:.8rem;font-weight:700"
                     th:text="${#strings.substring(user.username, 0, 1).toUpperCase()}">U</div>
                <span th:text="${user.username}">Username</span>
              </div>
            </td>
            <td style="color:#b3b3b3" th:text="${user.email}">email</td>
            <td>
              <span class="badge" th:classappend="${user.role == 'ADMIN'} ? 'badge-warn' : 'badge-info'"
                    th:text="${user.role}">USER</span>
            </td>
            <td>
              <span class="badge" th:classappend="${user.isActive} ? 'badge-success' : 'badge-danger'"
                    th:text="${user.isActive} ? 'Active' : 'Locked'">Active</span>
            </td>
            <td style="color:#6c757d;font-size:.8rem"
                th:text="${user.createdAt != null} ? ${#temporals.format(user.createdAt, 'MMM dd, yyyy')} : '-'">Date</td>
            <td>
              <div style="display:flex;gap:.5rem">
                <form th:action="@{/admin/users/{id}/toggle(id=${user.userId})}"
                      method="post" style="margin:0">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                  <button type="submit"
                          th:class="${user.isActive} ? 'btn btn-sm btn-outline' : 'btn btn-sm btn-success'"
                          th:text="${user.isActive} ? '🔒 Lock' : '🔓 Unlock'">Toggle</button>
                </form>
                <form th:action="@{/admin/users/{id}/delete(id=${user.userId})}"
                      method="post" style="margin:0"
                      onsubmit="return confirm('Permanently delete this user?')">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                  <button type="submit" class="btn btn-danger btn-sm">🗑</button>
                </form>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
      <div th:if="${userPage.totalPages > 1}" id="pagination-container"
     		th:attr="data-current=${userPage.number}, data-total=${userPage.totalPages}">
	  </div>
    </div>
  </main>
</div>
<script th:src="@{/js/app.js}"></script>
<script th:src="@{/js/pagination.js}"></script>
<script>
initPagination('pagination-container', '/admin/users');
</script>
</body>
</html>
