<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Manage Users – Admin</title>
  <link rel="icon" type="image/svg+xml" sizes="any" th:href="@{/favicon.svg(v=2)}"/>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="admin-layout">
  <div th:replace="~{fragments :: adminSidebar('users')}"></div>

  <main class="admin-main">
    <div class="admin-header">
      <h1>Users</h1>
      <p style="color:#6c757d;font-size:.875rem" th:text="|${userPage.totalElements} registered users|">0 users</p>
    </div>

    <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>

    <div style="background:var(--bg-elevated);border-radius:12px;overflow:hidden">
      <table class="data-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Username</th>
            <th>Email</th>
            <th>Verified?</th>
            <th>Role</th>
            <th>Status</th>
            <th>Joined</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="user : ${userPage.content}">
            <td style="color:#6c757d" th:text="${user.userId}">1</td>
            <td>
              <div style="display:flex;align-items:center;gap:.5rem">
                <div style="width:32px;height:32px;border-radius:50%;background:#e50914;
                            display:flex;align-items:center;justify-content:center;
                            font-size:.8rem;font-weight:700"
                     th:text="${#strings.substring(user.username, 0, 1).toUpperCase()}">U</div>
                <span th:text="${user.username}">Username</span>
              </div>
            </td>
            <td style="color:#b3b3b3" th:text="${user.email}">email</td>
            <td>
              <span class="badge" th:classappend="${user.isEmailVerified} ? 'badge-success' : 'badge-danger'"
                    th:text="${user.isEmailVerified} ? 'Verified' : 'Unverified'">Unverified</span>
            </td>
            <td>
              <span class="badge" th:classappend="${user.role == 'ADMIN'} ? 'badge-warn' : 'badge-info'"
                    th:text="${user.role}">USER</span>
            </td>
            <td>
              <span class="badge" th:classappend="${user.isActive} ? 'badge-success' : 'badge-danger'"
                    th:text="${user.isActive} ? 'Active' : 'Locked'">Active</span>
            </td>
            <td style="color:#6c757d;font-size:.8rem"
                th:text="${user.createdAt != null} ? ${#temporals.format(user.createdAt, 'MMM dd, yyyy')} : '-'">Date</td>
            <td>
              <div style="display:flex;gap:.5rem">
                <form th:action="@{/admin/users/{id}/toggle(id=${user.userId})}"
                      method="post" style="margin:0">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                  <button type="submit" th:class="${user.isActive} ? 'btn btn-sm btn-outline' : 'btn btn-sm btn-success'">
                    <svg th:if="${user.isActive}" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 256 256" style="margin-right:4px;vertical-align:-3px"><path d="M208,80H176V56a48,48,0,0,0-96,0V80H48A16,16,0,0,0,32,96V208a16,16,0,0,0,16,16H208a16,16,0,0,0,16-16V96A16,16,0,0,0,208,80ZM96,56a32,32,0,0,1,64,0V80H96Zm112,152H48V96H208V208Zm-32-56a8,8,0,0,1-8,8H96a8,8,0,0,1,0-16h72A8,8,0,0,1,176,152Z"></path></svg>
                    <svg th:unless="${user.isActive}" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 256 256" style="margin-right:4px;vertical-align:-3px"><path d="M208,80H104V56a24,24,0,0,1,48,0,8,8,0,0,0,16,0,40,40,0,0,0-80,0V80H48A16,16,0,0,0,32,96V208a16,16,0,0,0,16,16H208a16,16,0,0,0,16-16V96A16,16,0,0,0,208,80Zm-32,72a8,8,0,0,1-8,8H96a8,8,0,0,1,0-16h72A8,8,0,0,1,176,152Z"></path></svg>
                    <span th:text="${user.isActive} ? 'Lock' : 'Unlock'">Toggle</span>
                  </button>
                </form>
                <form th:action="@{/admin/users/{id}/delete(id=${user.userId})}"
                      method="post" style="margin:0"
                      onsubmit="return confirm('Permanently delete this user?')">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                  <button type="submit" class="btn btn-danger btn-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 256 256"><path d="M216,48H176V40a24,24,0,0,0-24-24H104A24,24,0,0,0,80,40v8H40a8,8,0,0,0,0,16h8V208a16,16,0,0,0,16,16H192a16,16,0,0,0,16-16V64h8a8,8,0,0,0,0-16ZM96,40a8,8,0,0,1,8-8h48a8,8,0,0,1,8,8v8H96Zm96,168H64V64H192ZM112,104v64a8,8,0,0,1-16,0V104a8,8,0,0,1,16,0Zm48,0v64a8,8,0,0,1-16,0V104a8,8,0,0,1,16,0Z"></path></svg>
                  </button>
                </form>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
      <div th:if="${userPage.totalPages > 1}" id="pagination-container"
     		th:attr="data-current=${userPage.number}, data-total=${userPage.totalPages}">
	  </div>
    </div>
  </main>
</div>
<script th:src="@{/js/app.js}"></script>
<script th:src="@{/js/pagination.js}"></script>
<script>
initPagination('pagination-container', '/admin/users');
</script>
</body>
</html>
