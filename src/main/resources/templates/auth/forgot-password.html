<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Forgot Password – MovieRec</title>
  <link rel="icon" type="image/svg+xml" sizes="any" th:href="@{/favicon.svg(v=2)}"/>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-mark">Reset <span>Password</span></div>
      <p>Nhận mã xác thực qua email và đặt lại mật khẩu.</p>
    </div>

    <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

    <form th:action="@{/auth/forgot-password/send-code}" method="post" style="margin-bottom:1.5rem">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <div class="form-group">
        <label class="form-label" for="email">Email của bạn</label>
        <input type="email" id="email" name="email" class="form-control"
               th:value="${email}" placeholder="you@example.com" required autocomplete="email"/>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;padding:12px">Gửi mã xác thực</button>
    </form>

    <div th:if="${step} == 'code'">
      <div class="alert alert-info" style="margin-bottom:1rem">
        Mã đã được gửi tới <strong th:text="${maskedEmail}">email</strong>. Nhập mã 6 số và mật khẩu mới.
      </div>
      <form th:action="@{/auth/reset-password}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" name="email" th:value="${email}"/>
        <div class="form-group">
          <label class="form-label" for="code">Mã xác thực (6 số)</label>
          <input type="text" id="code" name="code" class="form-control" pattern="[0-9]{6}" maxlength="6"
                 placeholder="123456" required/>
        </div>
        <div class="form-group">
          <label class="form-label" for="newPassword">Mật khẩu mới</label>
          <input type="password" id="newPassword" name="newPassword" class="form-control"
                 minlength="6" placeholder="••••••••" required/>
        </div>
        <div class="form-group">
          <label class="form-label" for="confirmPassword">Xác nhận mật khẩu</label>
          <input type="password" id="confirmPassword" name="confirmPassword" class="form-control"
                 minlength="6" placeholder="••••••••" required/>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;padding:12px">Đặt lại mật khẩu</button>
      </form>
    </div>

    <div style="text-align:center;margin-top:1.25rem">
      <a href="/auth/login" style="color:var(--text-muted)">Quay lại đăng nhập</a>
    </div>
  </div>
</div>
</body>
</html>
