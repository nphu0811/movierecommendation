<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Login – MovieRec</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-mark">Movie<span>Rec</span></div>
      <p>Sign in to your account</p>
    </div>

    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
    <div class="alert alert-success" th:if="${message}" th:text="${message}"></div>
    <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>

    <form th:action="@{/auth/login}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input type="email" id="email" name="email" class="form-control"
               placeholder="you@example.com" required autofocus autocomplete="email"/>
      </div>

      <div class="form-group">
        <label class="form-label" style="display:flex;justify-content:space-between;align-items:center">
          <span>Password</span>
          <a href="/auth/forgot-password" style="color:var(--red);font-size:.8rem;font-weight:500">Forgot password?</a>
        </label>
        <input type="password" id="password" name="password" class="form-control"
               placeholder="••••••••" required autocomplete="current-password"/>
      </div>

      <div style="display:flex;align-items:center;gap:8px;margin-bottom:20px">
        <input type="checkbox" name="remember-me" id="remember" style="accent-color:var(--red);width:16px;height:16px"/>
        <label for="remember" style="font-size:.875rem;color:var(--text-secondary)">Remember me for 7 days</label>
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%;padding:14px;font-size:1rem">
        Sign In
      </button>
    </form>

    <div style="text-align:center;margin-top:24px;color:var(--text-muted);font-size:.875rem">
      Don't have an account?
      <a href="/auth/register" style="color:var(--red);font-weight:600">Sign up free</a>
    </div>
  </div>
</div>
</body>
</html>
