<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Login – MovieRec</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo">
      <h1>Movie<span style="color:#fff">Rec</span></h1>
      <p style="color:#6c757d;font-size:.875rem;margin-top:.5rem">Sign in to your account</p>
    </div>

    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
    <div class="alert alert-success" th:if="${message}" th:text="${message}"></div>
    <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>

    <form th:action="@{/auth/login}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-control" placeholder="you@example.com" required autofocus/>
      </div>

      <div class="form-group">
        <label class="form-label" style="display:flex;justify-content:space-between">
          Password
          <a href="#" style="color:#e50914;font-size:.8rem">Forgot password?</a>
        </label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required/>
      </div>

      <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:1.25rem">
        <input type="checkbox" name="remember-me" id="remember" style="accent-color:#e50914"/>
        <label for="remember" style="font-size:.875rem;color:#b3b3b3">Remember me for 7 days</label>
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%;padding:.75rem;font-size:1rem">
        Sign In
      </button>
    </form>

    <div style="text-align:center;margin-top:1.5rem;color:#6c757d;font-size:.875rem">
      Don't have an account?
      <a href="/auth/register" style="color:#e50914;font-weight:600">Sign up free</a>
    </div>
  </div>
</div>
</body>
</html>
