<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Register – MovieRec</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo">
      <h1>Movie<span style="color:#fff">Rec</span></h1>
      <p style="color:#6c757d;font-size:.875rem;margin-top:.5rem">Create your free account</p>
    </div>

    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

    <form th:action="@{/auth/register}" method="post" th:object="${registerRequest}">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" th:field="*{username}" class="form-control"
               placeholder="cooluser123" required minlength="3"/>
        <span style="color:#f87171;font-size:.8rem" th:if="${#fields.hasErrors('username')}"
              th:errors="*{username}"></span>
      </div>

      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" th:field="*{email}" class="form-control"
               placeholder="you@example.com" required/>
        <span style="color:#f87171;font-size:.8rem" th:if="${#fields.hasErrors('email')}"
              th:errors="*{email}"></span>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" th:field="*{password}" class="form-control"
               placeholder="Min 6 characters" required minlength="6"/>
        <span style="color:#f87171;font-size:.8rem" th:if="${#fields.hasErrors('password')}"
              th:errors="*{password}"></span>
      </div>

      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input type="password" th:field="*{confirmPassword}" class="form-control"
               placeholder="Repeat your password" required/>
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%;padding:.75rem;font-size:1rem">
        Create Account
      </button>
    </form>

    <div style="text-align:center;margin-top:1.5rem;color:#6c757d;font-size:.875rem">
      Already have an account?
      <a href="/auth/login" style="color:#e50914;font-weight:600">Sign in</a>
    </div>
  </div>
</div>
</body>
</html>
