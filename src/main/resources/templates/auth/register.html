<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Register – MovieRec</title>
  <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}"/>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-mark">Movie<span>Rec</span></div>
      <p>Create your free account</p>
    </div>

    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

    <form th:action="@{/auth/register}" method="post" th:object="${registerRequest}">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input type="text" id="username" th:field="*{username}" class="form-control"
               placeholder="cooluser123" required minlength="3" autocomplete="username"/>
        <span style="color:#f87171;font-size:.8rem;margin-top:4px;display:block"
              th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></span>
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input type="email" id="email" th:field="*{email}" class="form-control"
               placeholder="you@example.com" required autocomplete="email"/>
        <span style="color:#f87171;font-size:.8rem;margin-top:4px;display:block"
              th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input type="password" id="password" th:field="*{password}" class="form-control"
               placeholder="Min 6 characters" required minlength="6" autocomplete="new-password"/>
        <span style="color:#f87171;font-size:.8rem;margin-top:4px;display:block"
              th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
      </div>

      <div class="form-group">
        <label class="form-label" for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" th:field="*{confirmPassword}" class="form-control"
               placeholder="Repeat your password" required autocomplete="new-password"/>
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%;padding:14px;font-size:1rem">
        Create Account
      </button>
    </form>

    <div style="text-align:center;margin-top:24px;color:var(--text-muted);font-size:.875rem">
      Already have an account?
      <a href="/auth/login" style="color:var(--red);font-weight:600">Sign in</a>
    </div>
  </div>
</div>
</body>
</html>
