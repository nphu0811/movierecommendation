<!-- MOVIE CARD fragment -->
<div th:fragment="movieCard(movie)" class="movie-card"
     th:if="${movie != null}"
     th:attr="onclick=|window.location='/movies/${movie.movieId}'|">
  <div class="movie-poster">
    <img th:if="${movie.posterUrl != null and !#strings.isEmpty(movie.posterUrl)}"
         th:src="${movie.posterUrl}" th:alt="${movie.title}" 
         class="movie-poster-img"
         loading="lazy"
         onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
    <div class="movie-poster-placeholder"
         th:style="${movie.posterUrl != null and !#strings.isEmpty(movie.posterUrl)} ? 'display:none' : 'display:flex'"><i class="ph-fill ph-film-strip"></i></div>
    <div class="movie-overlay">
      <div class="overlay-actions">
        <a th:href="@{/movies/{id}(id=${movie.movieId})}"
           class="btn btn-primary btn-sm"
           onclick="event.stopPropagation()"><i class="ph-fill ph-play" style="margin-right:4px"></i> View</a>
      </div>
    </div>
  </div>
  <div class="movie-info">
    <div class="movie-title" th:text="${movie.title}">Movie Title</div>
    <div class="movie-meta">
      <span class="movie-year" th:text="${movie.releaseYear}">2024</span>
      <span class="movie-rating"
            th:if="${movie.averageRating != null and movie.averageRating > 0}">
        <i class="ph-fill ph-star" style="color:var(--gold);vertical-align:-2px;margin-right:2px"></i> <span th:text="${#numbers.formatDecimal(movie.averageRating,1,1)}">4.5</span>
      </span>
    </div>
    <div class="genre-tags" th:if="${movie.genres != null and !movie.genres.empty}">
      <span class="genre-tag" th:each="g : ${movie.genres}" th:text="${g.genreName}">Genre</span>
    </div>
  </div>
</div>
