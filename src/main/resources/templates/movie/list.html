<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta name="_csrf" th:content="${_csrf.token}"/>
  <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Movies – MovieRec</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <style>
    .pagination {
      display:flex; align-items:center; justify-content:center;
      gap:.35rem; margin-top:2.5rem; flex-wrap:wrap;
    }
    .page-btn {
      min-width:38px; height:38px; padding:0 .6rem;
      display:inline-flex; align-items:center; justify-content:center;
      border-radius:6px; border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.04); color:#b3b3b3;
      font-size:.85rem; font-weight:500; cursor:pointer;
      text-decoration:none; transition:all .15s;
    }
    .page-btn:hover { background:rgba(255,255,255,.1); color:#fff; border-color:rgba(255,255,255,.3); }
    .page-btn.active { background:#e50914; border-color:#e50914; color:#fff; }
    .page-btn.dots { cursor:default; background:none; border:none; color:#555; }
    .page-btn.nav { padding:0 .9rem; gap:.3rem; font-size:.82rem; }
  </style>
</head>
<body>
<div th:replace="~{fragments :: navbar}"></div>
<div th:replace="~{search-overlay :: searchOverlay}"></div>

<div class="section">
  <div class="section-header">
    <h1 class="section-title">🎬 All <span>Movies</span></h1>
    <span style="color:#6c757d;font-size:.875rem"
          th:text="|${moviePage.totalElements} movies|">0 movies</span>
  </div>

  <!-- Genre filter -->
  <div style="display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:2rem">
    <a href="/movies" class="btn btn-outline btn-sm" style="border-color:#e50914;color:#e50914">All</a>
    <a th:each="genre : ${allGenres}"
       th:href="@{/search(q=${genre.genreName})}"
       th:text="${genre.genreName}"
       class="btn btn-outline btn-sm">Genre</a>
  </div>

  <!-- Grid -->
  <div class="movies-grid" th:if="${!moviePage.content.empty}">
    <th:block th:each="movie : ${moviePage.content}">
      <div th:replace="~{fragments :: movieCard(${movie})}"></div>
    </th:block>
  </div>

  <div class="empty-state" th:if="${moviePage.content.empty}">
    <div class="icon">🎬</div>
    <h3>No movies yet</h3>
  </div>

  <!-- Smart Pagination -->
  <div th:if="${moviePage.totalPages > 1}" id="pagination-container"
       th:attr="data-current=${moviePage.number}, data-total=${moviePage.totalPages}">
  </div>
</div>

<script th:src="@{/js/app.js}"></script>
<script th:src="@{/js/pagination.js}"></script>
<script>
initPagination('pagination-container', '/movies');
</script>
</body>
</html>
