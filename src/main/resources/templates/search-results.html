<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta name="_csrf" th:content="${_csrf.token}"/>
  <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title th:text="|Search: ${keyword} – MovieRec|">Search Results</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments :: navbar}"></div>
<div th:replace="~{search-overlay :: searchOverlay}"></div>

<div class="section">
  <div class="section-header">
    <h1 class="section-title">
      🔍 Results for "<span th:text="${keyword}">query</span>"
    </h1>
    <span style="color:#6c757d;font-size:.875rem"
          th:text="|${#lists.size(movies)} result(s)|">0 results</span>
  </div>

  <div class="movies-grid" th:if="${!#lists.isEmpty(movies)}">
    <th:block th:each="movie : ${movies}"><div th:replace="~{fragments :: movieCard(${movie})}"></div></th:block>
  </div>

  <div class="empty-state" th:if="${#lists.isEmpty(movies)}">
    <div class="icon">🔍</div>
    <h3>No results found</h3>
    <p style="margin-bottom:1.5rem">Try different keywords or browse all movies.</p>
    <a href="/movies" class="btn btn-primary">Browse All Movies</a>
  </div>
</div>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
