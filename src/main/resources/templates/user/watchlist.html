<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta name="_csrf" th:content="${_csrf.token}"/>
  <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>My Watchlist – MovieRec</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments :: navbar}"></div>
<div th:replace="~{search-overlay :: searchOverlay}"></div>
<div class="section">
  <div class="section-header">
    <h1 class="section-title">❤️ My <span>Watchlist</span></h1>
    <span style="color:#6c757d;font-size:.875rem"
          th:text="|${#lists.size(watchlist)} movie(s)|">0 movies</span>
  </div>

  <div class="movies-grid" th:if="${!#lists.isEmpty(watchlist)}">
    <th:block th:each="wl : ${watchlist}">
      <div th:replace="~{fragments :: movieCard(${wl.movie})}"></div>
    </th:block>
  </div>

  <div class="empty-state" th:if="${#lists.isEmpty(watchlist)}">
    <div class="icon">❤️</div>
    <h3>Your watchlist is empty</h3>
    <p style="margin-bottom:1.5rem">Save movies you want to watch later.</p>
    <a href="/movies" class="btn btn-primary">Browse Movies</a>
  </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
